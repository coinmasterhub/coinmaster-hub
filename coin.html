<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coin Master Reward</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
  text-align:center;
}

/* BACKGROUND EFFECT */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  overflow:hidden;
  z-index:-1;
}

.star{
  position:absolute;
  width:2px;
  height:80px;
  background:linear-gradient(white, transparent);
  opacity:0.7;
  transform:rotate(45deg);
  animation:fall linear infinite;
}

@keyframes fall{
  from{transform:translateY(-100px) translateX(0) rotate(45deg);}
  to{transform:translateY(800px) translateX(-300px) rotate(45deg);}
}

/* BOX */
.box{
  max-width:350px;
  margin:50px auto;
  background:#111;
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,255,255,0.2);
}

/* INPUT */
input, select{
  width:90%;
  padding:12px;
  margin:10px;
  border-radius:10px;
  border:none;
}

/* BUTTON */
.btn{
  display:block;
  margin:15px auto;
  padding:14px;
  width:90%;
  background:#00ffaa;
  color:#000;
  font-weight:bold;
  border-radius:10px;
  text-decoration:none;
  animation:blink 1s infinite;
}

@keyframes blink{
  0%{opacity:1;}
  50%{opacity:0.6;}
  100%{opacity:1;}
}

/* LOADING */
.bar{
  width:90%;
  height:20px;
  background:#222;
  border-radius:10px;
  margin:20px auto;
  overflow:hidden;
  display:none;
}

.progress{
  width:0%;
  height:100%;
  background:#00ffaa;
}

.status{
  font-size:14px;
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>

<div class="box">
<h2 style="color:#66ccff;text-shadow:0 0 10px #66ccff;">🎰 Coin Master Reward</h2>

<input type="text" id="user" placeholder="Enter Username">

<select id="amount">
<option>Select Reward</option>
<option>10,000 Coins</option>
<option>50,000 Coins</option>
<option>100,000 Coins</option>
</select>

<a href="#" class="btn" onclick="start()">Generate</a>

<div class="bar" id="bar">
<div class="progress" id="prog"></div>
</div>

<div class="status" id="status"></div>

</div>

<script>
// meteor effect
for(let i=0;i<15;i++){
 let s=document.createElement("div");
 s.className="star";
 s.style.left=Math.random()*100+"%";
 s.style.animationDuration=(Math.random()*2+1)+"s";
 s.style.animationDelay=Math.random()*5+"s";
 document.getElementById("bg").appendChild(s);
}

// generator
function start(){
 let user=document.getElementById("user").value;
 let amount=document.getElementById("amount").value;

 if(user=="" || amount=="Select Reward"){
  alert("Please fill all fields");
  return;
 }

 document.getElementById("bar").style.display="block";

 let p=0;
 let prog=document.getElementById("prog");
 let status=document.getElementById("status");

 let i=setInterval(()=>{
  p+=10;
  prog.style.width=p+"%";

  if(p==20) status.innerText="Connecting...";
  if(p==40) status.innerText="Checking account...";
  if(p==60) status.innerText="Generating coins...";
  if(p==80) status.innerText="Finalizing...";
  
  if(p==100){
    clearInterval(i);
    status.innerText="Success! Click below to continue.";

    // tombol lanjut muncul
    let btn=document.createElement("a");
    btn.href="https://appchecker.space/cl/i/271x3k";
    btn.innerText="Continue";
    btn.className="btn";
    document.querySelector(".box").appendChild(btn);
  }

 },400);
}
</script>

</body>
</html>
